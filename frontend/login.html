<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 400px;">

        <h2 class="text-center mb-4">TechStore</h2>
        <h5 class="text-center mb-4">Iniciar Sesión</h5>

        <input type="email" id="correo" class="form-control mb-3" placeholder="Correo">

        <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

        <button class="btn btn-primary w-100" onclick="login()">
            Entrar
        </button>

        <p class="text-center mt-3">
            ¿No tienes cuenta?
            <a href="registro.html">Regístrate</a>
        </p>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
