<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <nav class="col-md-3 col-lg-2 sidebar p-3">
            <h4 class="text-center mb-4">💻 TechStore</h4>

            <div class="d-grid gap-2">
                <a href="index.html" class="btn">📊 Dashboard</a>
                <a href="productos.html" class="btn active">📦 Productos</a>
                <a href="clientes.html" class="btn">👥 Clientes</a>
                <a href="ventas.html" class="btn">🛒 Punto de Venta</a>
                <a href="reportes.html" class="btn">📈 Reportes</a>

                <button class="btn btn-danger mt-4" onclick="cerrarSesion()">
                    Cerrar Sesión
                </button>
            </div>
        </nav>

        <main class="col-md-9 col-lg-10 content">

            <h1>Gestión de Productos</h1>
            <p class="text-muted">Administra el inventario de productos de TechStore.</p>

            <div class="card card-dashboard p-4 mb-4">
                <h4>Registrar Producto</h4>

                <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
                <input type="text" id="descripcion" class="form-control mb-2" placeholder="Descripción">
                <input type="number" id="precio" class="form-control mb-2" placeholder="Precio">
                <input type="number" id="stock" class="form-control mb-2" placeholder="Stock">
                <input type="text" id="categoria" class="form-control mb-2" placeholder="Categoría">

                <button class="btn btn-success" onclick="guardarProducto()">
                    Guardar Producto
                </button>
            </div>

            <div class="card card-dashboard p-4">
                <h4>Lista de Productos</h4>

                <table class="table table-bordered mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Categoría</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProductos"></tbody>
                </table>
            </div>

        </main>

    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/productos.js"></script>

<script>
function cerrarSesion() {
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
}
</script>

</body>
</html>
