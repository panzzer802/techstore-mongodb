<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ventas TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <nav class="col-md-3 col-lg-2 sidebar p-3">
            <h4 class="text-center mb-4">💻 TechStore</h4>

            <div class="d-grid gap-2">
                <a href="index.html" class="btn">📊 Dashboard</a>
                <a href="productos.html" class="btn">📦 Productos</a>
                <a href="clientes.html" class="btn">👥 Clientes</a>
                <a href="ventas.html" class="btn active">🛒 Punto de Venta</a>
                <a href="reportes.html" class="btn">📈 Reportes</a>

                <button class="btn btn-danger mt-4" onclick="cerrarSesion()">
                    Cerrar Sesión
                </button>
            </div>
        </nav>

        <main class="col-md-9 col-lg-10 content">

            <h1>Punto de Venta</h1>
            <p class="text-muted">Registra ventas, calcula totales y descuenta inventario automáticamente.</p>

            <div class="card card-dashboard p-4 mb-4">
                <h4>Crear Venta</h4>

                <label>Cliente</label>
                <select id="cliente" class="form-control mb-2"></select>

                <label>Producto</label>
                <select id="producto" class="form-control mb-2"></select>

                <input type="number" id="cantidad" class="form-control mb-2" placeholder="Cantidad">

                <button class="btn btn-primary mb-2" onclick="agregarProductoVenta()">
                    Agregar Producto
                </button>

                <h5>Total: $<span id="total">0</span></h5>

                <button class="btn btn-success" onclick="guardarVenta()">
                    Guardar Venta
                </button>
                <button class="btn btn-dark mt-2" onclick="imprimirTicket()">
                    Imprimir Ticket
                </button>
            </div>

            <div class="card card-dashboard p-4 mb-4">
                <h4>Productos de la Venta</h4>

                <table class="table table-bordered mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="tablaVenta"></tbody>
                </table>
            </div>

            <div class="card card-dashboard p-4">
                <h4>Historial de Ventas</h4>

                <table class="table table-bordered mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Cliente</th>
                            <th>Total</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="tablaHistorial"></tbody>
                </table>
            </div>

        </main>

    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/ventas.js"></script>

<script>
function cerrarSesion() {
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
}
</script>

</body>
</html>
